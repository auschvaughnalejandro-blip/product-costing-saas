# Serve the built SPA and reverse-proxy the API so the browser uses one origin.
# The upstream name `api` resolves to the API container on the compose network;
# override it with a different host in other deployments if needed.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API requests are forwarded to the API container.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Static assets get long-lived caching; index.html is always revalidated.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Single-page app: every other path falls back to index.html for client routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
