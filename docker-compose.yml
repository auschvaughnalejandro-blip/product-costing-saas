# Local development stack.
# Phase 0: the PostgreSQL database (used by `npm run dev`).
# Phase 12 adds the `api` and `web` services so `docker compose up`
# runs the whole application. See DEPLOYMENT.md.

services:
  db:
    image: postgres:16-alpine
    container_name: costing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costing}
      POSTGRES_DB: ${POSTGRES_DB:-costing}
    ports:
      - '5432:5432'
    volumes:
      - costing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-costing} -d ${POSTGRES_DB:-costing}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  costing-db-data:
